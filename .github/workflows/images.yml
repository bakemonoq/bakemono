name: images

# build the board + tracker container images and push to GHCR.
# packages publish under ghcr.io/<owner>/<image>; make them public once to let the board pull without creds.
on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "Dockerfile.tracker"
      - "defaults/**"
      - ".github/workflows/images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: bakemono-board
            dockerfile: Dockerfile
          - image: bakemono-tracker
            dockerfile: Dockerfile.tracker
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
