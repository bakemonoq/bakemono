name: server

# the board binary + bundled gallery-dl/ffmpeg, tarred so a host runs the whole board from the
# console without docker
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: server-${{ matrix.target }}
          cache-on-failure: true

      # node is only a build-time tool here, to fetch the ffmpeg-static binary
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build gallery-dl standalone
        shell: bash
        run: |
          python -m pip install --upgrade pip pyinstaller gallery-dl
          echo "from gallery_dl import main; main()" > gdl_entry.py
          pyinstaller --onefile --name gallery-dl --collect-all gallery_dl gdl_entry.py

      - name: Build the board
        run: cargo build --release -p bakemono-board --target ${{ matrix.target }}

      - name: Package server bundle
        shell: bash
        run: |
          set -euo pipefail
          TARGET="${{ matrix.target }}"
          PKG="bakemono-server-$TARGET"
          rm -rf "$PKG"; mkdir -p "$PKG/bin"
          cp "target/$TARGET/release/bakemono" "$PKG/bin/bakemono"
          cp "dist/gallery-dl"                 "$PKG/bin/gallery-dl"
          npm i --no-save ffmpeg-static
          cp "$(node -e "process.stdout.write(require('ffmpeg-static'))")" "$PKG/bin/ffmpeg"
          chmod +x "$PKG/bin/"*
          cat > "$PKG/bakemono" <<LAUNCH
          #!/bin/sh
          DIR="\$(cd "\$(dirname "\$0")" && pwd)"
          export BAKEMONO_GALLERY_DL="\$DIR/bin/gallery-dl"
          export BAKEMONO_FFMPEG="\$DIR/bin/ffmpeg"
          exec "\$DIR/bin/bakemono" "\$@"
          LAUNCH
          chmod +x "$PKG/bakemono"
          cat > "$PKG/README.txt" <<'DOC'
          Bakemono server bundle (no docker).

          Needs postgres (DATABASE_URL) and a local kubo daemon; ipfs-cluster-service for a fleet.

          ./bakemono serve                          run the board
          ./bakemono scrape <url> [cookies] [n]     one-off scrape into the archive
          ./bakemono ingest <dir>                   import an already-scraped directory
          ./bakemono keygen [dir]                   generate the cookie encryption keypair
          ./bakemono autoimport < private.pem       run one keyed import round
          ./bakemono restore <head-cid>             rebuild everything from a keeper

          macOS: clear quarantine once with  xattr -dr com.apple.quarantine .
          DOC
          tar czf "$PKG.tar.gz" "$PKG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bakemono-server-${{ matrix.target }}
          path: bakemono-server-${{ matrix.target }}.tar.gz

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          PKG="bakemono-server-${{ matrix.target }}.tar.gz"
          gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --draft --title "$TAG" -R "$GITHUB_REPOSITORY"
          gh release upload "$TAG" "$PKG" --clobber -R "$GITHUB_REPOSITORY"
