name: release

# cut a release by pushing a tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# secrets required: TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD (updater key).
# see docs/RELEASING.md
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      # sole owner of release creation, so concurrent build jobs never race to make duplicate drafts
      - name: Ensure one draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          if ! gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" -R "$GITHUB_REPOSITORY" --draft \
              --title "Bakemono $TAG" --notes "Desktop installers and server bundles."
          fi
          id=$(gh release view "$TAG" -R "$GITHUB_REPOSITORY" --json databaseId --jq .databaseId)
          echo "release_id=$id" >> "$GITHUB_OUTPUT"

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            extra_args: ""
            stable_asset: Bakemono_aarch64.dmg
            bundle_glob: target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          # AppImage bundling fails on an opaque linuxdeploy error (tauri-apps/tauri#14796), so ship deb + rpm
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            extra_args: "--bundles deb,rpm"
            stable_asset: Bakemono_amd64.deb
            bundle_glob: target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            extra_args: ""
            stable_asset: Bakemono_x64-setup.exe
            bundle_glob: target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      # node is only a build-time tool here, to fetch the ffmpeg-static binary
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build gallery-dl standalone
        shell: bash
        run: |
          python -m pip install --upgrade pip pyinstaller gallery-dl
          echo "from gallery_dl import main; main()" > gdl_entry.py
          pyinstaller --onefile --name gallery-dl --collect-all gallery_dl gdl_entry.py

      - name: Stage app bundle (daemon + gallery-dl + ffmpeg)
        shell: bash
        run: |
          set -euo pipefail
          TARGET="${{ matrix.target }}"
          EXE=""
          [ "$RUNNER_OS" = "Windows" ] && EXE=".exe"
          APP=crates/bakemono-app
          mkdir -p "$APP/binaries"
          # our daemon, built for this target and shipped beside the gui
          cargo build --release -p bakemono-daemon --target "$TARGET"
          cp "target/$TARGET/release/bakemono-daemon$EXE" "$APP/binaries/bakemono-daemon-$TARGET$EXE"
          # gallery-dl built above
          cp "dist/gallery-dl$EXE" "$APP/binaries/gallery-dl-$TARGET$EXE"
          # ffmpeg for thumbnail generation: ffmpeg-static ships a portable static build per os/arch
          npm i --no-save ffmpeg-static
          FFMPEG_BIN="$(node -e "process.stdout.write(require('ffmpeg-static'))")"
          cp "$FFMPEG_BIN" "$APP/binaries/ffmpeg-$TARGET$EXE"
          chmod +x "$APP/binaries/ffmpeg-$TARGET$EXE" || true

      - name: Build, bundle, sign updater, upload to the shared draft
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: crates/bakemono-app
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }} ${{ matrix.extra_args }}

      # the board's /contribute page links to versionless asset names under releases/latest/download.
      # upload a stable-named copy of each installer so those links survive version bumps. best-effort:
      # never fail the release if a bundle path or naming needs a tweak
      - name: Upload stable-named installer
        if: always()
        shell: bash
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          built=$(ls ${{ matrix.bundle_glob }} 2>/dev/null | head -1 || true)
          if [ -z "$built" ]; then echo "no bundle matched ${{ matrix.bundle_glob }}"; exit 0; fi
          cp "$built" "${{ matrix.stable_asset }}"
          gh release upload "${{ github.ref_name }}" "${{ matrix.stable_asset }}" --clobber
