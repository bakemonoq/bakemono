[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.0.0"
edition = "2021"
license = "AGPL-3.0-or-later"
repository = "https://github.com/bakemono/bakemono"

[workspace.dependencies]
nostr = "0.44.3"
nostr-sdk = "0.44.1"
nostr-relay-builder = "0.44.1"
thiserror = "2"
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }
anyhow = "1"
sha2 = "0.11"
hex = "0.4"
