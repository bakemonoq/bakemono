services:
  postgres:
    image: postgres:16
    # default 64m starves parallel query shared memory; a card-view refresh then falls back to a ~29s
    # serial rebuild instead of a few-second parallel one
    shm_size: 1g
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: bakemono
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - bakemono-pg:/var/lib/postgresql/data
    restart: unless-stopped

  kubo:
    image: ipfs/kubo:latest
    ports:
      - "4001:4001"
      - "4001:4001/udp"
      - "127.0.0.1:5001:5001"
      - "127.0.0.1:8081:8080"
    volumes:
      - bakemono-ipfs:/data/ipfs
      # nopfs auto-loads $IPFS_PATH/denylists/*.deny; the board drops bakemono.deny here
      - bakemono-denylist:/data/ipfs/denylists
      - ./defaults/kubo-init.sh:/container-init.d/kubo-init.sh:ro
    restart: unless-stopped

  cluster:
    image: ipfs/ipfs-cluster:latest
    depends_on:
      - kubo
    environment:
      CLUSTER_PEERNAME: ${CLUSTER_PEERNAME:-board}
      # 32-byte hex; the libp2p network fence all cluster peers and followers must share.
      # this default is a throwaway for local single-node use - generate your own with
      # `openssl rand -hex 32` and set CLUSTER_SECRET before exposing the cluster port to anyone
      CLUSTER_SECRET: ${CLUSTER_SECRET:-61255a25c121abcfbc61e59ff58b338ff4b04667e18b0d5f570ce44a1ab6b436}
      CLUSTER_IPFSHTTP_NODEMULTIADDRESS: /dns4/kubo/tcp/5001
      CLUSTER_CRDT_TRUSTEDPEERS: ${CLUSTER_TRUSTED_PEERS:-*}
      CLUSTER_RESTAPI_HTTPLISTENMULTIADDRESS: /ip4/0.0.0.0/tcp/9094
      CLUSTER_LISTENMULTIADDRESS: /ip4/0.0.0.0/tcp/9096
      CLUSTER_MONITORPINGINTERVAL: 2s
    ports:
      - "127.0.0.1:9094:9094"
      - "9096:9096"
    volumes:
      - bakemono-cluster:/data/ipfs-cluster
    restart: unless-stopped

  board:
    image: ${BOARD_IMAGE:-bakemono-board:latest}
    build:
      context: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/bakemono?sslmode=disable}
      BAKEMONO_KUBO_API: ${BAKEMONO_KUBO_API:-http://kubo:5001}
      BAKEMONO_CLUSTER_API: ${BAKEMONO_CLUSTER_API:-http://cluster:9094}
      # cluster config (mounted ro) that /follower.json is derived from, and the public multiaddr
      # keepers dial, e.g. /dns4/board.example/tcp/9096
      BAKEMONO_CLUSTER_CONFIG_DIR: /cluster
      BAKEMONO_CLUSTER_PUBLIC_ADDR: ${BAKEMONO_CLUSTER_PUBLIC_ADDR:-}
      # ed25519 board key (hex) that signs manifest heads; unset generates into the key file below
      BAKEMONO_BOARD_KEY: ${BAKEMONO_BOARD_KEY:-}
      BAKEMONO_BOARD_KEY_FILE: /data/board.key
      # seconds between scrape passes over enabled sources; 0 disables the scheduler
      BAKEMONO_SCRAPE_INTERVAL_SECS: ${BAKEMONO_SCRAPE_INTERVAL_SECS:-21600}
      # two scrape proxies applied to every platform: _PROXY carries the api, _MEDIA_PROXY the bulk
      # media (defaults to _PROXY). a `session-<token>` segment is rotated per scrape. Fanbox needs a
      # proxy (Cloudflare) so _PROXY must be set for it to appear in /contribute; unset = scrape direct
      BAKEMONO_SCRAPE_PROXY: ${BAKEMONO_SCRAPE_PROXY:-}
      BAKEMONO_SCRAPE_MEDIA_PROXY: ${BAKEMONO_SCRAPE_MEDIA_PROXY:-}
      # space/comma list of file extensions to keep (e.g. "jpg png mp4"); a file outside the list is
      # never ingested. empty = keep everything. use it to run an image/video-only archive
      BAKEMONO_KEEP_EXTENSIONS: ${BAKEMONO_KEEP_EXTENSIONS:-}
      # mod password (HTTP Basic auth); leave unset to disable /mod
      BAKEMONO_MOD_TOKEN: ${BAKEMONO_MOD_TOKEN:-}
      # board title shown in the header, browser tab and /info; unset keeps the default wordmark
      BAKEMONO_BOARD_NAME: ${BAKEMONO_BOARD_NAME:-}
      # DMCA and general contact shown on /info
      BAKEMONO_DMCA_CONTACT: ${BAKEMONO_DMCA_CONTACT:-}
      BAKEMONO_CONTACT: ${BAKEMONO_CONTACT:-}
      # richer customization (mascot, welcome/about html, accent, community links) lives in board.toml.
      # copy board.toml.example to ./board.toml, then uncomment BAKEMONO_CONFIG and the mount below
      # BAKEMONO_CONFIG: /config/board.toml
      BAKEMONO_DENYLIST_DIR: /denylists
    expose:
      - "3000"
    volumes:
      - bakemono-data:/data
      - bakemono-scrape:/scrape
      - bakemono-cluster:/cluster:ro
      - bakemono-denylist:/denylists
      # - ./board.toml:/config/board.toml:ro
    depends_on:
      - postgres
      - kubo
      - cluster
    restart: unless-stopped

  # single origin for browsers: /ipfs/* -> kubo gateway (media), everything else -> board
  caddy:
    image: caddy:2
    depends_on:
      - board
      - kubo
    ports:
      - "3000:80"
    volumes:
      - ./defaults/Caddyfile:/etc/caddy/Caddyfile:ro
      - bakemono-caddy:/data
    restart: unless-stopped

volumes:
  bakemono-pg:
  bakemono-ipfs:
  bakemono-cluster:
  bakemono-data:
  bakemono-scrape:
  bakemono-denylist:
  bakemono-caddy:
