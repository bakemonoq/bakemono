<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bakemono preview</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem }
    input { width: 100%; padding: .5rem; font-family: monospace }
    button { margin-top: .5rem; padding: .5rem 1rem }
    #status { color: #555 }
    img, video { max-width: 100%; display: block; margin-top: 1rem }
  </style>
</head>
<body>
  <h3>Bakemono WebTorrent preview</h3>
  <p>Paste a manifest magnet from another machine's seeder and load it over WebRTC.</p>
  <input id="magnet" placeholder="magnet:?xt=urn:btih:...">
  <button id="go">Load</button>
  <p id="status"></p>
  <div id="out"></div>

  <script src="https://cdn.jsdelivr.net/npm/webtorrent@2.3.0/dist/webtorrent.min.js"></script>
  <script>
    const client = new WebTorrent()
    const status = (t) => { document.getElementById('status').textContent = t }
    client.on('error', (e) => status('error: ' + e.message))

    document.getElementById('go').onclick = () => {
      const magnet = document.getElementById('magnet').value.trim()
      if (!magnet) return
      document.getElementById('out').innerHTML = ''
      status('connecting to the swarm...')
      client.add(magnet, (torrent) => {
        status('peer found, downloading ' + torrent.files.length + ' file(s)...')
        torrent.on('wire', () => status('connected to ' + torrent.numPeers + ' peer(s), downloading...'))
        torrent.files.forEach((file) => {
          file.getBlobURL((err, url) => {
            if (err) return status('blob error: ' + err.message)
            const isVideo = /\.(mp4|webm|mov)$/i.test(file.name)
            const el = document.createElement(isVideo ? 'video' : 'img')
            if (isVideo) el.controls = true
            el.src = url
            document.getElementById('out').appendChild(el)
            status('rendered ' + file.name)
          })
        })
      })
    }
  </script>
</body>
</html>
