<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bakemono preview</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem }
    input { width: 100%; padding: .5rem; font-family: monospace }
    button { margin-top: .5rem; padding: .5rem 1rem }
    #status { color: #555; white-space: pre-wrap }
    #warn { color: #a60; font-size: .85rem }
    img, video { max-width: 100%; display: block; margin-top: 1rem }
  </style>
</head>
<body>
  <h3>Bakemono WebTorrent preview</h3>
  <p>Paste a manifest magnet from another machine's seeder and load it over WebRTC.</p>
  <input id="magnet" placeholder="magnet:?xt=urn:btih:...">
  <button id="go" disabled>Load</button>
  <p id="status">loading webtorrent...</p>
  <p id="warn"></p>
  <div id="out"></div>

  <script type="module">
    const status = (t) => { document.getElementById('status').textContent = t }
    const warn = (t) => { document.getElementById('warn').textContent = t }
    window.addEventListener('error', (e) => status('page error: ' + (e.message || e)))
    window.addEventListener('unhandledrejection', (e) => status('error: ' + (e.reason?.message || e.reason)))

    let WebTorrent
    try {
      ({ default: WebTorrent } = await import('./webtorrent.min.js'))
    } catch (e) {
      status('failed to import webtorrent.min.js: ' + e.message)
    }
    if (!WebTorrent) throw new Error('webtorrent unavailable')

    // WebTorrent needs Web Crypto, which only exists in a secure context (https or http://localhost)
    if (!window.isSecureContext) {
      status('open this page over https or via http://localhost - a LAN IP over http has no Web Crypto, which WebTorrent needs')
      throw new Error('insecure context')
    }

    // empty iceServers = host candidates only, no STUN round-trips (fast on a LAN)
    const client = new WebTorrent({ tracker: { rtcConfig: { iceServers: [] } } })
    client.on('error', (e) => status('client error: ' + e.message))

    const go = document.getElementById('go')
    go.disabled = false
    status('ready - paste a magnet and click Load')

    go.onclick = () => {
      const magnet = document.getElementById('magnet').value.trim()
      if (!magnet) return
      document.getElementById('out').innerHTML = ''
      warn('')

      const torrent = client.add(magnet)
      torrent.on('warning', (w) => warn('warning: ' + w.message))

      const tick = setInterval(() => {
        status(`peers: ${torrent.numPeers} | metadata: ${torrent.ready ? 'yes' : 'no'} | progress: ${Math.round(torrent.progress * 100)}% | down: ${(torrent.downloadSpeed / 1000).toFixed(1)} kB/s`)
      }, 500)

      const render = () => {
        for (const file of torrent.files) {
          file.blob().then((blob) => {
            const isVideo = /\.(mp4|webm|mov)$/i.test(file.name)
            const el = document.createElement(isVideo ? 'video' : 'img')
            if (isVideo) el.controls = true
            el.src = URL.createObjectURL(blob)
            document.getElementById('out').appendChild(el)
          }).catch((err) => warn('blob error: ' + err.message))
        }
      }
      torrent.on('ready', render)
      torrent.on('done', () => { clearInterval(tick); status('done - ' + torrent.name + ' (' + torrent.numPeers + ' peers)') })
    }
  </script>
</body>
</html>
