# operator-only: image-only deploy, copy just this file to the box, no source checkout needed.
# a machine with the source builds + pushes the image and ships board.toml/static/kubo-init.sh
# alongside this file; a fresh clone should use docker-compose.yml instead. paths below are relative
# to that shipped layout on the box, so they will not resolve from the repo root
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: bakemono
    volumes:
      - bakemono-pg:/var/lib/postgresql/data
    restart: unless-stopped

  kubo:
    image: ipfs/kubo:latest
    ports:
      - "4001:4001"
      - "4001:4001/udp"
    volumes:
      - bakemono-ipfs:/data/ipfs
      # nopfs auto-loads $IPFS_PATH/denylists/*.deny; the board writes bakemono.deny here so the
      # gateway blocks revoked CIDs immediately, not just after GC
      - bakemono-denylist:/data/ipfs/denylists
      - ./kubo-init.sh:/container-init.d/kubo-init.sh:ro
    restart: unless-stopped

  cluster:
    image: ipfs/ipfs-cluster:latest
    depends_on:
      - kubo
    environment:
      CLUSTER_PEERNAME: ${CLUSTER_PEERNAME:-board}
      # 32-byte hex fencing the cluster's libp2p network; set a real one before exposing 9096
      CLUSTER_SECRET: ${CLUSTER_SECRET:?set CLUSTER_SECRET}
      CLUSTER_IPFSHTTP_NODEMULTIADDRESS: /dns4/kubo/tcp/5001
      CLUSTER_CRDT_TRUSTEDPEERS: ${CLUSTER_TRUSTED_PEERS:-*}
      CLUSTER_RESTAPI_HTTPLISTENMULTIADDRESS: /ip4/0.0.0.0/tcp/9094
      CLUSTER_LISTENMULTIADDRESS: /ip4/0.0.0.0/tcp/9096
    ports:
      # 9096 is what keepers dial; leave 9094 (the pin API) unpublished
      - "9096:9096"
    volumes:
      - bakemono-cluster:/data/ipfs-cluster
    restart: unless-stopped

  board:
    image: ${BOARD_IMAGE:-localhost:5050/bakemono-board:latest}
    pull_policy: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/bakemono?sslmode=disable}
      BAKEMONO_KUBO_API: http://kubo:5001
      BAKEMONO_CLUSTER_API: http://cluster:9094
      # cluster config (mounted ro) that /follower.json derives from, and the multiaddr keepers dial
      BAKEMONO_CLUSTER_CONFIG_DIR: /cluster
      BAKEMONO_CLUSTER_PUBLIC_ADDR: ${BAKEMONO_CLUSTER_PUBLIC_ADDR:-}
      # ed25519 board key (hex) that signs manifest heads; unset generates into the key file below
      BAKEMONO_BOARD_KEY: ${BAKEMONO_BOARD_KEY:-}
      BAKEMONO_BOARD_KEY_FILE: /data/board.key
      # seconds between scrape passes over enabled sources; 0 disables the scheduler
      BAKEMONO_SCRAPE_INTERVAL_SECS: ${BAKEMONO_SCRAPE_INTERVAL_SECS:-21600}
      # two scrape proxies applied to every platform: _PROXY carries the api, _MEDIA_PROXY the bulk
      # media (defaults to _PROXY). a `session-<token>` segment is rotated per scrape. Fanbox needs a
      # proxy (Cloudflare) so _PROXY must be set for it to appear in /contribute; unset = scrape direct
      BAKEMONO_SCRAPE_PROXY: ${BAKEMONO_SCRAPE_PROXY:-}
      BAKEMONO_SCRAPE_MEDIA_PROXY: ${BAKEMONO_SCRAPE_MEDIA_PROXY:-}
      # mod password (HTTP Basic auth); leave unset to disable /mod
      BAKEMONO_MOD_TOKEN: ${BAKEMONO_MOD_TOKEN:-}
      # board title shown in the header, browser tab and /info; unset keeps the default wordmark
      BAKEMONO_BOARD_NAME: ${BAKEMONO_BOARD_NAME:-}
      # DMCA and general contact shown on /info
      BAKEMONO_DMCA_CONTACT: ${BAKEMONO_DMCA_CONTACT:-}
      BAKEMONO_CONTACT: ${BAKEMONO_CONTACT:-}
      # richer customization (mascot, welcome/about html, community links) lives in board.toml, mounted below;
      # deploy.sh ships ./board.toml and ./static from this dir. the env vars above still apply as a fallback
      BAKEMONO_CONFIG: /config/board.toml
      # where the board writes bakemono.deny for the co-located Kubo's nopfs (shared volume below)
      BAKEMONO_DENYLIST_DIR: /denylists
    ports:
      - "3000:3000"
    volumes:
      - bakemono-data:/data
      - bakemono-scrape:/scrape
      - bakemono-cluster:/cluster:ro
      - bakemono-denylist:/denylists
      # board.toml + static assets shipped by deploy.sh; static_dir in board.toml should be /config/static
      - ./board.toml:/config/board.toml:ro
      - ./static:/config/static:ro
    depends_on:
      - postgres
      - kubo
      - cluster
    restart: unless-stopped

volumes:
  bakemono-pg:
  bakemono-ipfs:
  bakemono-cluster:
  bakemono-data:
  bakemono-scrape:
  bakemono-denylist:
