# image-only: copy just this file to the mac-mini, no source needed.
# build + push from a machine that has the source (see deploy.sh), then `docker compose -f docker-compose.deploy.yml up -d`
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bakemono
    volumes:
      - bakemono-pg:/var/lib/postgresql/data
    restart: unless-stopped

  relay:
    image: scsibug/nostr-rs-relay:latest
    ports:
      - "${RELAY_PORT:-8080}:8080"
    volumes:
      - bakemono-relay:/usr/src/app/db
    restart: unless-stopped

  tracker:
    image: ${TRACKER_IMAGE:-localhost:5050/bakemono-tracker:latest}
    pull_policy: always
    ports:
      - "${TRACKER_PORT:-9100}:8000"
    restart: unless-stopped

  board:
    image: ${BOARD_IMAGE:-localhost:5050/bakemono-board:latest}
    pull_policy: always
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/bakemono?sslmode=disable
      BAKEMONO_RELAYS: ${BAKEMONO_RELAYS:-ws://relay:8080}
      BAKEMONO_ICE_SERVERS: ${BAKEMONO_ICE_SERVERS:-[]}
      # mod queue password (HTTP Basic auth); leave unset to disable /mod
      BAKEMONO_MOD_TOKEN: ${BAKEMONO_MOD_TOKEN:-}
      # instance keypair (nsec) that signs kind 31064 takedowns; unset keeps hides local-only
      BAKEMONO_INSTANCE_NSEC: ${BAKEMONO_INSTANCE_NSEC:-}
      # peer instance npubs/hex whose takedowns this board honors, comma-separated
      BAKEMONO_TRUSTED_INSTANCES: ${BAKEMONO_TRUSTED_INSTANCES:-}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - relay
    restart: unless-stopped

volumes:
  bakemono-pg:
  bakemono-relay:
