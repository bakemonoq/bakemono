# image-only: copy just this file to the mac-mini, no source needed.
# build + push from a machine that has the source (see deploy.sh), then `docker compose -f docker-compose.deploy.yml up -d`
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: bakemono
    volumes:
      - bakemono-pg:/var/lib/postgresql/data
    restart: unless-stopped

  relay:
    image: scsibug/nostr-rs-relay:latest
    ports:
      - "${RELAY_PORT:-8080}:8080"
    volumes:
      - bakemono-relay:/usr/src/app/db
      - ./relay/config.toml:/usr/src/app/config.toml:ro
    restart: unless-stopped

  board:
    image: ${BOARD_IMAGE:-localhost:5050/bakemono-board:latest}
    pull_policy: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/bakemono?sslmode=disable}
      BAKEMONO_RELAYS: ${BAKEMONO_RELAYS:-ws://relay:8080}
      # BT peer port the gateway listens on; must match the published port below and be open at the firewall
      BAKEMONO_GATEWAY_PORT: ${BAKEMONO_GATEWAY_PORT:-4240}
      # optional: comma-separated ip:port seeders to dial directly (a known seedbox), bypassing tracker/DHT
      BAKEMONO_GATEWAY_PEERS: ${BAKEMONO_GATEWAY_PEERS:-}
      # on-disk cache cap in GB; over budget, least-recently-used content is evicted. 0 = unlimited
      BAKEMONO_CACHE_GB: ${BAKEMONO_CACHE_GB:-10}
      # per-client cold-miss rate limit (a miss joins a swarm): token bucket size, 0 disables; refill per second
      BAKEMONO_COLD_MISS_BURST: ${BAKEMONO_COLD_MISS_BURST:-20}
      BAKEMONO_COLD_MISS_REFILL: ${BAKEMONO_COLD_MISS_REFILL:-1}
      # mod queue password (HTTP Basic auth); leave unset to disable /mod
      BAKEMONO_MOD_TOKEN: ${BAKEMONO_MOD_TOKEN:-}
      # instance keypair (nsec) that signs kind 31064 takedowns; unset keeps hides local-only
      BAKEMONO_INSTANCE_NSEC: ${BAKEMONO_INSTANCE_NSEC:-}
      # peer instance npubs/hex whose takedowns this board honors, comma-separated
      BAKEMONO_TRUSTED_INSTANCES: ${BAKEMONO_TRUSTED_INSTANCES:-}
      # board title shown in the header, browser tab and /info; unset keeps the default wordmark
      BAKEMONO_BOARD_NAME: ${BAKEMONO_BOARD_NAME:-}
      # DMCA and general contact shown on /info
      BAKEMONO_DMCA_CONTACT: ${BAKEMONO_DMCA_CONTACT:-}
      BAKEMONO_CONTACT: ${BAKEMONO_CONTACT:-}
      # richer customization (mascot, welcome/about html, community links) lives in board.toml, mounted below;
      # deploy.sh ships ./board.toml and ./static from this dir. the env vars above still apply as a fallback
      BAKEMONO_CONFIG: /config/board.toml
    ports:
      - "3000:3000"
      - "${BAKEMONO_GATEWAY_PORT:-4240}:${BAKEMONO_GATEWAY_PORT:-4240}"
      - "${BAKEMONO_GATEWAY_PORT:-4240}:${BAKEMONO_GATEWAY_PORT:-4240}/udp"
    volumes:
      - bakemono-cache:/cache
      # board.toml + static assets shipped by deploy.sh; static_dir in board.toml should be /config/static
      - ./board.toml:/config/board.toml:ro
      - ./static:/config/static:ro
    depends_on:
      - postgres
      - relay
    restart: unless-stopped

volumes:
  bakemono-pg:
  bakemono-relay:
  bakemono-cache:
